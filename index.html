<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced YouTube Study Player</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Advanced YouTube Study Player</h1>
        
        <div class="input-group">
            <input type="text" id="url-input" placeholder="Paste YouTube video or playlist URL here...">
            <button id="play-btn">Play</button>
        </div>

        <div class="video-container">
            <div id="player"></div>
        </div>

        <div class="controls-section">
            <div class="control-group">
                <label for="speed-slider">Playback Speed: <span id="speed-value" class="accent-text">1.00x</span></label>
                <input type="range" id="speed-slider" min="0.25" max="10" step="0.25" value="1">
            </div>

            <div class="control-group">
                <label for="boost-slider">Audio Boost: <span id="boost-value" class="accent-text">100%</span></label>
                <input type="range" id="boost-slider" min="100" max="500" step="10" value="100">
                <span id="boost-warning" class="warning-text">High audio boost may cause distortion.</span>
            </div>
        </div>

        <div class="playlist-controls" id="playlist-controls">
            <button id="prev-btn" class="secondary-btn">Previous Video</button>
            <div class="current-video-title" id="video-title">No video playing</div>
            <button id="next-btn" class="secondary-btn">Next Video</button>
        </div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="app.js"></script>
</body>
</html>
