<!DOCTYPE html>
<html>

<head>

<title>Advanced YouTube Tool</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<h1>Advanced YouTube Player</h1>

<div class="url-box">

<input id="urlInput" placeholder="Paste YouTube link">

<button id="playBtn">
Play
</button>

</div>

<video
id="videoPlayer"
controls
crossorigin="anonymous">
</video>

<div class="controls">

<div class="control">

<label>Playback Speed</label>

<input
type="range"
id="speedSlider"
min="0.25"
max="10"
step="0.25"
value="1">

</div>

<div class="control">

<label>
Audio Boost
<span id="boostValue">100%</span>
</label>

<input
type="range"
id="boostSlider"
min="1"
max="5"
step="0.1"
value="1">

<div id="boostWarning"></div>

</div>

</div>

</div>

<script src="player.js"></script>
<script src="audioBoost.js"></script>

</body>

</html>
